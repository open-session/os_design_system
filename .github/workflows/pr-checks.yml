name: PR checks

on:
  pull_request:
    paths:
      - "package/**"
      - "tokens/**"
      - ".github/workflows/pr-checks.yml"
  push:
    branches:
      - main
    paths:
      - "package/**"
      - "tokens/**"

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify pack output
        run: npm pack --dry-run
