name: Publish package

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Build and publish to Figma's npm registry
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: npm run verify-tag

      - name: Build
        run: npm run build

      - name: Publish to Figma's npm registry
        # Constructs an ephemeral .npmrc with the scope-to-registry mapping
        # plus the auth token. The token comes from the FIGMA_NPMRC secret.
        # The registry URL is workspace-specific but not itself a credential —
        # it identifies the destination, the token is what authorizes writes.
        # File never gets committed (gitignored + ephemeral runner FS).
        run: |
          cat > .npmrc <<EOF
          @opensession:registry=https://registry.figma.com/npm/13fa1a51-10cf-4212-aace-6443b7121961/registry/
          //registry.figma.com/npm/13fa1a51-10cf-4212-aace-6443b7121961/registry/:_authToken=${FIGMA_NPMRC}
          EOF
          npm publish
        env:
          FIGMA_NPMRC: ${{ secrets.FIGMA_NPMRC }}
