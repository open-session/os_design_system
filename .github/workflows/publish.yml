name: Publish package

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Build and publish to Figma's npm registry
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: npm run verify-tag

      - name: Build
        run: npm run build

      - name: Publish to Figma's npm registry
        # Writes the .npmrc snippet generated by Figma (scope mapping + auth token)
        # from the FIGMA_NPMRC secret to package/.npmrc. The file is ephemeral —
        # it lives only on this runner and is discarded with the job. It is also
        # gitignored as a defense-in-depth in case anyone runs this locally.
        run: |
          printf '%s\n' "$FIGMA_NPMRC" > .npmrc
          npm publish
        env:
          FIGMA_NPMRC: ${{ secrets.FIGMA_NPMRC }}
