name: Publish package

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Build and publish to npmjs.com
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          scope: "@open-session"
          cache: npm
          cache-dependency-path: package/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: npm run verify-tag

      - name: Build
        run: npm run build

      - name: Publish
        run: |
          # Write project-scoped .npmrc with the auth token reference. setup-node@v4
          # writes one to $RUNNER_TEMP and points NPM_CONFIG_USERCONFIG at it, but
          # that path interacts unreliably with `defaults.run.working-directory`
          # (npm publish here landed on ENEEDAUTH). Writing one in cwd is bulletproof.
          printf '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}\n@open-session:registry=https://registry.npmjs.org/\n' > .npmrc
          npm publish --access restricted --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
