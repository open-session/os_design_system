name: Publish package

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Build and publish to npmjs.com
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm Trusted Publishers (OIDC) + provenance
    defaults:
      run:
        working-directory: package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: npm run verify-tag

      - name: Build
        run: npm run build

      - name: Publish
        # Auth happens via npm Trusted Publishers (OIDC) using the id-token
        # permission above. No NPM_TOKEN, no .npmrc write, no OTP.
        # Configured on npmjs.com per package at:
        # Package → Settings → Trusted publishing
        run: npm publish --access public --provenance
